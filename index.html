<!DOCTYPE html>
<html lang="nl">
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dorpshuis Agenda</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            background-color: transparent;
            font-size: 21px;
            width: 1520px;
            height: 850px;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: transparent;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: transparent;
            max-width: 98%;
            width: 98%;
            max-height: 98%;
            height: 98%;
            margin-left: 5%;
            margin-right: 5%;
            margin-bottom: 1%;
            color: rgba(0, 254, 212, 1);
        }

        h1 {
            text-align: center;
            color: #ff0;
        }

        .appointments {
            background-color: transparent;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            font-size: 1.4rem;
            margin-top: 0;
        }

        .columnleft {
            background-color: transparent;
            margin-left: 1%;
            width: 45%;
        }

        .columnright {
            background-color: transparent;
            margin-left: auto;
            margin-right: 1%;
            width: 45%;
        }

        .appointment-group {
            margin-bottom: 1rem;
        }

        .date {
            background-color: transparent;
            font-weight: bold;
            background: rgba(248, 234, 234, 0.1);
            color: rgb(0, 195, 255);
            font-size: 1.2rem;
            border-radius: 5px;
            text-align: left;
            border: 0 solid #ffffff;
            margin: 0;
            margin-top: 0.5rem;
            padding: 3px;
        }

        .event {
            background-color: transparent;
            margin-block-start: 0.5em;
            margin: 0;
            padding: 1px 0;
            font-size: 1.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5em;
            align-items: baseline;
        }

        .event.current {
            background-color: transparent;
            font-weight: bold;
            background: rgba(200, 200, 200, 0.5);
            border-radius: 5px;
            padding: 3px;
        }

        .time {
            background-color: transparent;
            color: #d2e665;
            font-size: 0.8rem;
            margin: 0;
            padding: 0;
            display: inline;
        }

        .title {
            background-color: transparent;
            color: #04e8f8;
            font-size: 1.2rem;
            padding: 3px;
            display: inline;
        }

        .location {
            background-color: transparent;
            color: #e8ebdc;
            font-size: 0.8rem;
            margin: 0;
            padding: 0;
            display: inline;
        }

        .loading,
        .error {
            background-color: transparent;
            text-align: center;
            color: #fff;
            padding: 2rem;
        }

        .error {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="appointments" id="appointments">
            <div class="loading">Laden gegevens...</div>
        </div>
    </div>
</body>
</html>
